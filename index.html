<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор пакетов</title>
<style>
:root{--bg:#f8f1f3;--surface:#fff;--text:#171717;--muted:#5e5e5e;--line:#d6e6da;--line-strong:#8fb89a;--accent:#3d8b57;--accent-dark:#2f6f45;--accent-soft:#eaf5ed;--shadow:0 10px 30px rgba(57,96,69,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:40px 16px}
.wrap{max-width:1080px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.wrap:before{content:'';position:absolute;left:0;top:0;width:340px;height:340px;background:radial-gradient(circle,rgba(61,139,87,.11),transparent 68%)}
.head{padding:42px 38px 20px;text-align:center;position:relative;z-index:1}
h1{margin:0;font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.sub{margin-top:10px;color:#6a6a6a}
.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);gap:22px;padding:12px 22px 22px;position:relative;z-index:1}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:22px;min-width:0}
.panel{background:linear-gradient(180deg,#fcfffd,#f7fbf8)}
.step+.step{margin-top:18px}
.step h3,.card h3{margin:0 0 12px;font-size:18px;font-weight:800}
.seg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.btn{border:1.5px solid var(--line);background:#fff;border-radius:14px;min-height:54px;padding:10px 12px;cursor:pointer;transition:.18s ease;font-size:15px;font-weight:700;color:#333}
.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);background:#fbfefc}
.btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.dropdown{position:relative}
.drop-btn{width:100%;min-height:56px;padding:10px 14px;border:1.5px solid var(--line);border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;font-size:15px;font-weight:700;color:#333;transition:.18s ease}
.drop-btn:hover{border-color:var(--line-strong);background:#fbfefc}
.drop-btn.open{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,139,87,.10)}
.drop-value{display:flex;align-items:center;gap:10px;min-width:0}
.chev{font-size:12px;color:#6b6b6b}
.drop-menu{position:absolute;left:0;right:0;top:calc(100% + 8px);background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.08);padding:8px;z-index:20;display:grid;gap:6px;max-height:320px;overflow:auto}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;background:#fff;border-radius:12px;cursor:pointer;text-align:left;font-size:14px;font-weight:700;color:#333}
.drop-item:hover{background:#f7fbf8}
.drop-item.active{background:var(--accent-soft);color:var(--accent-dark)}
.swatch{width:20px;height:20px;border-radius:50%;border:1.5px solid #d7d7d7;flex:0 0 auto;background:var(--sw)}
.swatch.white{box-shadow:inset 0 0 0 1px #d8d8d8}
.swatch.transparent{background:linear-gradient(45deg,#efefef 25%,#fff 25%,#fff 50%,#efefef 50%,#efefef 75%,#fff 75%,#fff 100%);background-size:8px 8px}
.sum{display:grid;gap:14px;min-width:0}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.badge{border:1px solid #dfece2;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:#36523f;background:#fff}
.row{display:flex;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px dashed #e9efe9;font-size:15px;color:#444}
.row:last-child{border-bottom:none;padding-bottom:0}
.row strong{color:#191919}
.formula{font-size:14px;color:var(--muted);line-height:1.55;margin-top:8px}
.totalcard{background:linear-gradient(180deg,#f8fcf9,#eef7f1);border-color:#d8ebde}
.total{font-size:40px;font-weight:900;color:var(--accent-dark);line-height:1;margin-top:6px}
.hint{margin-top:10px;padding:10px 12px;border-radius:12px;background:#f3f8f4;font-size:13px;color:#35523f;border:1px solid #dce9df}
.warn{background:#fff7ea;border-color:#efd7ab;color:#7b5b16}
.err{background:#fff2f0;border-color:#efc5bf;color:#7d2d25}
@media (max-width:980px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
@media (max-width:560px){
  body{padding:10px 8px}
  .wrap{border-radius:22px}
  .head{padding:18px 14px 10px}
  h1{font-size:24px}
  .grid{padding:10px;gap:10px}
  .panel,.card{padding:14px;border-radius:18px}
  .seg{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .btn{min-height:46px;padding:8px;font-size:13px;border-radius:12px}
  .drop-btn{min-height:50px;font-size:14px}
  .badge{font-size:12px;padding:7px 10px}
  .row,.formula,.hint{font-size:12px}
  .total{font-size:28px}
}
</style>
</head>
<body>
<section class="wrap">
  <div class="head">
    <h1>Калькулятор расчёта стоимости печати на пакетах</h1>
  </div>
  <div class="grid" id="app"></div>
</section>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHIQzs8fmY_qpGXkSGL6WD0yACrtbuc8wfb_K9e_k_abdNd49VA9dAUUoEREEY7kAsew/exec';

const APP = {
  sizes: [
    {id:'225x340',label:'225 × 340'},
    {id:'300x400',label:'300 × 400'},
    {id:'360x450',label:'360 × 450'},
    {id:'380x500',label:'380 × 500'},
    {id:'450x500',label:'450 × 500'},
    {id:'600x500',label:'600 × 500'},
    {id:'700x500',label:'700 × 500'},
    {id:'500x600',label:'500 × 600'},
    {id:'700x600',label:'700 × 600'}
  ],
  colors: [
    {id:'white',label:'Белый',hex:'#ffffff'},
    {id:'transparent',label:'Прозрачный',hex:'transparent',transparent:true},
    {id:'black',label:'Чёрный',hex:'#000000'},
    {id:'darkblue',label:'Т-синий',hex:'#0016b8'},
    {id:'lightblue',label:'Св.синий',hex:'#2020ff'},
    {id:'blue',label:'Синий',hex:'#1f56ff'},
    {id:'green',label:'Зелёный',hex:'#009b00'},
    {id:'beige',label:'Бежевый',hex:'#f4d36c'},
    {id:'red',label:'Красный',hex:'#ff1a0f'},
    {id:'orange',label:'Оранжевый',hex:'#ff7f00'},
    {id:'silver',label:'Серебро',hex:'#bebebe'},
    {id:'burgundy',label:'Бордовый',hex:'#9b0000'},
    {id:'yellow',label:'Жёлтый',hex:'#ffd400'}
  ],
  qty:[100,200,300,500,1000,2000,3000,5000],
  printColors:[1,2,3,4,5,6],
  printSides:[1,2]
};

const money = v => new Intl.NumberFormat('ru-RU', {maximumFractionDigits: 2}).format(Number(v || 0)) + ' руб.';
const n0 = v => new Intl.NumberFormat('ru-RU', {maximumFractionDigits: 0}).format(Number(v || 0));

class Calc {
  constructor(root){
    this.root = root;
    this.s = {size:'300x400', color:'', qty:100, printColors:1, printSides:1};
    this.isColorOpen = false;
    this.loaded = false;
    this.error = '';
    this.data = {
      unitPrices: {},
      printPrices: {},
      sizeGroups: {}
    };

    this.render();

    document.addEventListener('click', (e) => {
      if (!e.target.closest('[data-color-dropdown]') && this.isColorOpen) {
        this.isColorOpen = false;
        this.render();
      }
    });

    this.loadData();
  }

  loadJsonp(url){
    return new Promise((resolve, reject) => {
      const cb = '__jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
      const src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
      const script = document.createElement('script');
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error('JSONP timeout'));
      }, 12000);

      function cleanup(){
        clearTimeout(timer);
        if (script.parentNode) script.parentNode.removeChild(script);
        try { delete window[cb]; } catch (e) { window[cb] = undefined; }
      }

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('Ошибка загрузки JSONP'));
      };

      script.src = src;
      document.body.appendChild(script);
    });
  }

  async loadData(){
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'PASTE_YOUR_WEB_APP_URL_HERE') {
      this.error = 'Не вставлен APPS_SCRIPT_URL.';
      this.render();
      return;
    }

    try {
      const json = await this.loadJsonp(APPS_SCRIPT_URL);
      if (!json || !json.ok || !json.data) {
        throw new Error('Apps Script вернул пустые данные');
        if (!json.ok) throw new Error(json.error || 'Apps Script вернул ok:false');
if (!json.data) throw new Error('Apps Script не вернул data');
      }

      this.data = {
        unitPrices: json.data.unitPrices || {},
        printPrices: json.data.printPrices || {},
        sizeGroups: json.data.sizeGroups || {}
      };

      this.loaded = true;
      this.error = '';
      this.ensureValidState();
      this.render();
    } catch (err) {
      this.loaded = false;
      this.error = 'Не удалось загрузить цены из Google Sheets: ' + (err && err.message ? err.message : String(err));
      this.render();
    }
  }

  getAvailableColors(size){
    const unitMap = size ? (this.data.unitPrices[size] || {}) : {};
    return APP.colors.filter(i => Object.prototype.hasOwnProperty.call(unitMap, i.id));
  }

  getPrintMapForSize(size){
    if (this.data.printPrices && this.data.printPrices[size]) {
      return this.data.printPrices[size];
    }


    const grp = this.data.sizeGroups ? this.data.sizeGroups[size] : '';
    if (grp && this.data.printPrices && this.data.printPrices[grp]) {
      return this.data.printPrices[grp];
    }

    return {};
  }

  ensureValidState(){
    const colors = this.getAvailableColors(this.s.size);
    if (this.s.color && !colors.find(x => x.id === this.s.color)) this.s.color = '';
    if (!this.s.color && colors.length) this.s.color = colors[0].id;
  }

  btn(label, active, a, v, disabled = false){
    return `<button type="button" class="btn ${active ? 'active' : ''}" data-a="${a}" data-v="${v}" ${disabled ? 'disabled' : ''}>${label}</button>`;
  }

  colorUI(availableColors){
    if (!this.loaded) {
      return `<div class="hint"></div>`;
    }

    if (!availableColors.length) {
      return `<div class="hint warn"></div>`;
    }

    const current = APP.colors.find(x => x.id === this.s.color);

    return `<div class="dropdown" data-color-dropdown">
      <button type="button" class="drop-btn ${this.isColorOpen ? 'open' : ''}" data-a="toggleColor">
        <span class="drop-value">
          ${
            current
              ? `<span class="swatch ${current.id === 'white' ? 'white' : ''} ${current.transparent ? 'transparent' : ''}" style="${current.transparent ? '' : `--sw:${current.hex}`}"></span><span>${current.label}</span>`
              : '<span>Выберите цвет</span>'
          }
        </span>
        <span class="chev">${this.isColorOpen ? '▲' : '▼'}</span>
      </button>
      ${
        this.isColorOpen
          ? `<div class="drop-menu">${
              availableColors.map(i =>
                `<button type="button" class="drop-item ${this.s.color === i.id ? 'active' : ''}" data-a="color" data-v="${i.id}">
                  <span class="swatch ${i.id === 'white' ? 'white' : ''} ${i.transparent ? 'transparent' : ''}" style="${i.transparent ? '' : `--sw:${i.hex}`}"></span>
                  <span>${i.label}</span>
                </button>`
              ).join('')
            }</div>`
          : ''
      }
    </div>`;
  }

  calc(){
    const s = this.s;
    const unitMap = s.size ? (this.data.unitPrices[s.size] || {}) : {};
    const availableColors = this.getAvailableColors(s.size);
    const unitPrice = (s.size && s.color && this.loaded) ? Number(unitMap[s.color] || 0) : 0;

    const printMap = this.loaded ? this.getPrintMapForSize(s.size) : {};
    const qtyPrices = s.qty ? (printMap[String(s.qty)] || {}) : {};
    const printBase = s.qty ? Number(qtyPrices[String(s.printColors)] || 0) : 0;
    const printPrice = printBase * s.printSides;
    const bagsPrice = unitPrice * (s.qty || 0);
    const total = bagsPrice + printPrice;

    return {availableColors, unitPrice, printBase, printPrice, bagsPrice, total};
  }

  render(){
    this.ensureValidState();
    const s = this.s;
    const c = this.calc();
    const size = APP.sizes.find(x => x.id === s.size);
    const color = APP.colors.find(x => x.id === s.color);
    const missingBag = this.loaded && !c.unitPrice;
    const missingPrint = this.loaded && !c.printBase;

    this.root.innerHTML = `<div class="panel">
      <div class="step">
        <h3>Размер пакета</h3>
        <div class="seg">
          ${APP.sizes.map(i => this.btn(i.label, s.size === i.id, 'size', i.id)).join('')}
        </div>
      </div>

      <div class="step">
        <h3>Цвет пакета</h3>
        ${this.colorUI(c.availableColors)}
      </div>

      <div class="step">
        <h3>Тираж</h3>
        <div class="seg">
          ${APP.qty.map(i => this.btn(i + ' шт.', s.qty === i, 'qty', i)).join('')}
        </div>
      </div>

      <div class="step">
        <h3>Параметры печати</h3>
        <div class="seg" style="margin-bottom:10px">
          ${APP.printColors.map(i => this.btn(i + ' цв.', s.printColors === i, 'pc', i)).join('')}
        </div>
        <div class="seg">
          ${APP.printSides.map(i => this.btn(i === 1 ? '1 сторона' : '2 стороны', s.printSides === i, 'ps', i)).join('')}
        </div>
      </div>
    </div>

    <div class="sum">
      ${this.error ? `<div class="card hint err">${this.error}</div>` : ''}

      <div class="card">
        <div class="badges">
          ${size ? `<div class="badge">${size.label}</div>` : ''}
          ${color ? `<div class="badge">${color.label}</div>` : ''}
          ${s.qty ? `<div class="badge">${n0(s.qty)} шт.</div>` : ''}
          ${s.qty ? `<div class="badge">${s.printColors} цв. печати</div><div class="badge">${s.printSides === 1 ? '1 сторона' : '2 стороны'}</div>` : ''}
        </div>

        ${missingBag ? '<div class="hint warn">' : ''}
        ${missingPrint ? '<div class="hint warn"></div>' : ''}
      </div>

      <div class="card">
        <h3>Расчёт стоимости</h3>
      </div>

      <div class="card totalcard">
        <h3>Итоговая стоимость</h3>
        <div class="total">${money(c.total)}</div>
      </div>
    </div>`;

    this.root.querySelectorAll('[data-a]').forEach(el => el.addEventListener('click', (e) => {
      const a = el.dataset.a;
      let v = el.dataset.v;

      if (['qty','pc','ps'].includes(a)) v = Number(v);

      if (a === 'toggleColor') {
        e.stopPropagation();
        this.isColorOpen = !this.isColorOpen;
        this.render();
        return;
      }

      if (a === 'size') {
        this.s.size = v;
        this.s.color = '';
        this.isColorOpen = false;
      }
      if (a === 'color') {
        this.s.color = v;
        this.isColorOpen = false;
      }
      if (a === 'qty') this.s.qty = v;
      if (a === 'pc') this.s.printColors = v;
      if (a === 'ps') this.s.printSides = v;

      this.render();
    }));
  }
}

new Calc(document.getElementById('app'));
</script>
</body>
</html>
